name: Refresh Session

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Session id to refresh (e.g. CER01A, ATH04).'
        required: true
        type: string
      prompt:
        description: 'Extra instructions appended to grounding and writing prompts (e.g. "Noah Lyles withdrew due to injury").'
        required: false
        type: string
      skip_grounding:
        description: 'Skip Perplexity grounding; reuse existing relatedNews/sources.'
        required: false
        type: boolean
        default: false
      skip_writing:
        description: 'Skip Anthropic writing; only refresh grounding.'
        required: false
        type: boolean
        default: false
      skip_scoring:
        description: 'Skip Anthropic scoring; leave existing scorecard in place.'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Print resolved prompts without making API calls.'
        required: false
        type: boolean
        default: false

concurrency:
  group: content-write-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Refresh session
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_DATABASE_ID: ${{ secrets.CLOUDFLARE_DATABASE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SESSION_ID: ${{ inputs.session_id }}
          PROMPT: ${{ inputs.prompt }}
          SKIP_GROUNDING: ${{ inputs.skip_grounding }}
          SKIP_WRITING: ${{ inputs.skip_writing }}
          SKIP_SCORING: ${{ inputs.skip_scoring }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          ARGS=("--remote" "$SESSION_ID")
          if [ -n "$PROMPT" ]; then ARGS+=("--prompt" "$PROMPT"); fi
          if [ "$SKIP_GROUNDING" = "true" ]; then ARGS+=("--skip-grounding"); fi
          if [ "$SKIP_WRITING" = "true" ]; then ARGS+=("--skip-writing"); fi
          if [ "$SKIP_SCORING" = "true" ]; then ARGS+=("--skip-scoring"); fi
          if [ "$DRY_RUN" = "true" ]; then ARGS+=("--dry-run"); fi
          pnpm refresh "${ARGS[@]}"
